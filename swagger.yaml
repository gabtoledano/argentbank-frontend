swagger: "2.0"
info:
  title: Argent Bank Transactions API
  description: API endpoints for bank transactions - Phase 2
  version: "1.0.0"
host: localhost:3001
basePath: /api/v1
schemes:
  - http
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header

paths:
  /accounts:
    get:
      tags:
        - Accounts
      summary: Get all user accounts
      description: Retrieve all bank accounts for the authenticated user
      security:
        - Bearer: []
      produces:
        - application/json
      responses:
        200:
          description: Successfully retrieved accounts
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: "Accounts retrieved successfully"
              body:
                type: array
                items:
                  $ref: "#/definitions/Account"
        401:
          description: Unauthorized - Invalid or missing token
        500:
          description: Internal server error

  /accounts/{accountId}/transactions:
    get:
      tags:
        - Transactions
      summary: Get all transactions for an account
      description: Retrieve all transactions for the current month for a specific account
      security:
        - Bearer: []
      produces:
        - application/json
      parameters:
        - name: accountId
          in: path
          required: true
          type: string
          description: The unique ID of the account
      responses:
        200:
          description: Successfully retrieved transactions
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: "Transactions retrieved successfully"
              body:
                type: array
                items:
                  $ref: "#/definitions/Transaction"
        401:
          description: Unauthorized - Invalid or missing token
        404:
          description: Account not found
        500:
          description: Internal server error

  /accounts/{accountId}/transactions/{transactionId}:
    get:
      tags:
        - Transactions
      summary: Get transaction details
      description: Retrieve the full details of a specific transaction
      security:
        - Bearer: []
      produces:
        - application/json
      parameters:
        - name: accountId
          in: path
          required: true
          type: string
          description: The unique ID of the account
        - name: transactionId
          in: path
          required: true
          type: string
          description: The unique ID of the transaction
      responses:
        200:
          description: Successfully retrieved transaction details
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: "Transaction retrieved successfully"
              body:
                $ref: "#/definitions/TransactionDetail"
        401:
          description: Unauthorized - Invalid or missing token
        404:
          description: Transaction not found
        500:
          description: Internal server error

    patch:
      tags:
        - Transactions
      summary: Update or delete transaction category and/or note
      description: >
        Partially update a transaction. Both fields are optional.
        Send only the fields you want to update.
        To delete the note, send note with a null value.
        Cannot modify date, description, amount or balance.
      security:
        - Bearer: []
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: accountId
          in: path
          required: true
          type: string
          description: The unique ID of the account
        - name: transactionId
          in: path
          required: true
          type: string
          description: The unique ID of the transaction
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/TransactionUpdate"
      responses:
        200:
          description: Transaction successfully updated
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: "Transaction updated successfully"
              body:
                $ref: "#/definitions/TransactionDetail"
        400:
          description: Bad request - Invalid fields
        401:
          description: Unauthorized - Invalid or missing token
        404:
          description: Transaction not found
        500:
          description: Internal server error

definitions:
  Account:
    type: object
    properties:
      id:
        type: string
        description: Unique account ID
        example: "abc123"
      title:
        type: string
        description: Account name
        example: "Argent Bank Checking (x3448)"
      amount:
        type: number
        description: Current account balance
        example: 48098.43
      description:
        type: string
        description: Balance type
        example: "Available Balance"

  Transaction:
    type: object
    properties:
      id:
        type: string
        description: Unique transaction ID
        example: "txn456"
      date:
        type: string
        format: date
        description: Transaction date
        example: "2020-02-27"
      description:
        type: string
        description: Transaction description
        example: "Golden Sun Bakery"
      amount:
        type: number
        description: Transaction amount
        example: 8.00
      balance:
        type: number
        description: Account balance after transaction
        example: 298.00

  TransactionDetail:
    type: object
    properties:
      id:
        type: string
        description: Unique transaction ID
        example: "txn456"
      date:
        type: string
        format: date
        description: Transaction date
        example: "2020-02-27"
      description:
        type: string
        description: Transaction description
        example: "Golden Sun Bakery"
      amount:
        type: number
        description: Transaction amount
        example: 8.00
      balance:
        type: number
        description: Account balance after transaction
        example: 298.00
      transactionType:
        type: string
        description: Type of transaction
        example: "Electronic"
      category:
        type: string
        description: Transaction category
        example: "Food"
      note:
        type: string
        description: "User note - null if deleted"
        example: "lorem ipsum"
        x-nullable: true

  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
        description: "Optional - Transaction category. Omit to leave unchanged."
        example: "Food"
      note:
        type: string
        description: "Optional - User note. Send null to delete the note."
        example: "lorem ipsum"
        x-nullable: true
